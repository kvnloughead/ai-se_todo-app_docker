services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./server
    environment:
      MONGO_URI: mongodb://mongo:27017/todos
    depends_on:
      - mongo

  frontend:
    build: ./client

  caddy:
    image: caddy:2-alpine
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  mongo_data:
  caddy_data:
  caddy_config:
